
- name: Create Consul directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: "{{ consul_user }}"
    group: "{{ consul_group }}"
    mode: "0750"
  loop:
    - "{{ consul_data_dir }}"
    - "{{ consul_config_dir }}"

- name: Create TLS cert directory
  ansible.builtin.file:
    path: "{{ consul_config_dir }}/certs"
    state: directory
    owner: "{{ consul_user }}"
    group: "{{ consul_group }}"
    mode: "0750"
  when: consul_tls_enabled

- name: Copy TLS certificate
  ansible.builtin.copy:
    src: tls.crt
    dest: "{{ consul_config_dir }}/certs/tls.crt"
    owner: "{{ consul_user }}"
    group: "{{ consul_group }}"
    mode: "0644"
  notify: Restart Consul
  when: consul_tls_enabled

- name: Copy TLS private key
  ansible.builtin.copy:
    src: tls.key
    dest: "{{ consul_config_dir }}/certs/tls.key"
    owner: "{{ consul_user }}"
    group: "{{ consul_group }}"
    mode: "0600"
  notify: Restart Consul
  when: consul_tls_enabled

- name: Deploy Consul server configuration
  ansible.builtin.template:
    src: server.hcl.j2
    dest: "{{ consul_config_dir }}/server.hcl"
    owner: "{{ consul_user }}"
    group: "{{ consul_group }}"
    mode: "0640"
  notify: Restart Consul
