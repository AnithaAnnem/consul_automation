- name: Deploy systemd service
  ansible.builtin.template:
    src: consul.service.j2
    dest: /etc/systemd/system/consul.service
    mode: "0644"
  notify:
    - Reload systemd
    - Restart Consul

- name: Enable and start Consul
  ansible.builtin.systemd:
    name: consul
    enabled: true
    state: started
